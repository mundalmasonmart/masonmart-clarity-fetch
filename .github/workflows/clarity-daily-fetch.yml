name: Clarity Daily Fetch

'on':
  workflow_dispatch:
  schedule:
    - cron: "50 8 * * *"   # 14:20 IST daily

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Clarity daily fetch
        run: python fetch_daily.py
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}

      - name: Show generated files
        if: always()
        run: |
          echo "### Clarity Fetch Run" >> $GITHUB_STEP_SUMMARY
          echo "Run time UTC: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated files:" >> $GITHUB_STEP_SUMMARY
          ls -lh >> $GITHUB_STEP_SUMMARY

      - name: Upload report files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clarity-report
          path: |
            *.csv
            *.xlsx
            *.html
            *.sqlite

      - name: Commit updated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.sqlite *.csv *.xlsx *.html || true
          git commit -m "Update Clarity daily report" || echo "No changes to commit"
          git push