name: Clarity Daily Fetch

'on':
  workflow_dispatch:
  schedule:
    - cron: "50 8 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Clarity daily fetch
        run: python fetch_daily.py
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}

      - name: Upload report files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clarity-report
          path: |
            *.csv
            *.xlsx
            *.html
            *.sqlite